<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Início | Benjamin</title>
    <link rel="shortcut icon" href="ben_10_icon_by_subwooferlabs_dfk4i23-pre.ico">

    <style>
        nav ul {
            display: flex;
            justify-content: center;
            gap: 60px;
            list-style: none;
        }

        nav a {
            display: block;
            width: 200px;
            text-align: center;

            text-decoration: none;
            font-size: 40px;
            color: gray;
            
            background-color: white;
        }

        nav a.ativo {
            color: rgb(50, 181, 49);
            font-weight: bold;
            font-size: 60px;
            opacity: 1;
            animation: mudar 2s ease forwards;
        }

        nav a:not(.ativo):hover {
            color: rgb(50, 181, 49);
            font-size: 45px;
            transition: 0.3s;

        }

        nav a.inicio {
            animation: inicio 2s ease forwards;
        }

        @keyframes texto {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes mudar {
            0% {
                transform: translate(260px, 0px);
                background: none;
            }
            50%{
                background: none;
            }

            100% {
                transform: translate(0px, 0);
                
            }
        }

        @keyframes inicio {
            0% {
                transform: translate(-260px, 50px);
                background: none;
            }
            50%{
                background: none;
            }

            100% {
                transform: translate(0px, 0);
                
            }
        }
        

        .texto {
            position: absolute;
            top: 90px;
            left: 510px;
            display: flex;
            justify-content: center;
            align-items: center;

            text-align: center;

            width: 280px;
            

            background-color: white;
            
            overflow-wrap: break-word;
            word-break: break-word;
            overflow: hidden;

        }

        p {
            font-size: 20px;
            color: rgb(50, 181, 49);
             animation: texto 4s
            
        }
        .circulo {
            position: absolute;
            left: 340px;
            top: -250px;


            width: 600px;
            height: 400px;
            border-radius: 50%;
            border: solid rgb(50, 181, 49);
            opacity: 0.5;

            background-color: transparent;
            z-index: -1;

        }

    </style>
</head>

<body>
    <nav>
        <ul>
            <li><a href="sobreMim.html">Sobre Mim</a></li>
            <li><a href="index.html" class="ativo" >Início</a></li>
            <li><a href="projetos.html" class="inicio">Projetos</a></li>
        </ul>
    </nav>
    <p class="texto">Site acadêmico feito para a matéria de Desenvolvimento Web 2 (TDS), do professor Jefferson. Portfólio do aluno Benjamin.</p>
    <div class="circulo"></div>
    


</body>

</html>
