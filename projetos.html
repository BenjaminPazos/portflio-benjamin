<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Projetos | Benjamin</title>
    <link rel="shortcut icon" href="ben_10_icon_by_subwooferlabs_dfk4i23-pre.ico">

    <style>
        .lista-projetos {
            list-style: none;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 0;

            margin-top: 100px;
            margin-left: 30px;
        }

        nav ul {
            display: flex;
            justify-content: center;
            gap: 60px;
            list-style: none;
        }

        nav a {
            display: block;
            width: 200px;
            text-align: center;

            text-decoration: none;
            font-size: 40px;
            color: gray;

            background-color: white;
        }

        nav a.ativo {
            color: rgb(50, 181, 49);
            font-weight: bold;
            font-size: 60px;
            opacity: 1;
            transform: translate(0px, 50px);

            animation: mudar 2s ease forwards;
        }

        nav a:not(.ativo):hover {
            color: rgb(50, 181, 49);
            font-size: 45px;
            transition: 0.3s;
        }

        nav a.inicio {
            animation: inicio 2s ease forwards;
        }

        @keyframes mudar {
            from {
                transform: translate(0px, 50px);
                background: none;
            }

            50% {
                background: none;
            }

            to {
                transform: translate(-260px, 0);

            }
        }

        @keyframes inicio {
            from {
                transform: translate(0px, 0px);
                background: none;
            }

            50% {
                background: none;
            }

            to {
                transform: translate(260px, 0);

            }
        }

        @keyframes texto {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .circulo {
            position: absolute;
            left: 340px;
            top: -250px;


            width: 600px;
            height: 400px;
            border-radius: 50%;
            border: solid rgb(50, 181, 49);
            opacity: 0.5;

            background-color: transparent;
            z-index: -1;

        }


        .texto {
            position: absolute;
            top: 90px;
            left: 510px;
            display: flex;
            justify-content: center;
            align-items: center;

            text-align: center;

            width: 280px;


            background-color: white;

            overflow-wrap: break-word;
            word-break: break-word;
            overflow: hidden;

        }

        p {
            font-size: 30px;
            color: rgb(50, 181, 49);
            animation: texto 4s
        }

        img {
            border: solid rgb(50, 181, 49);
            border-radius: 10px;
            animation: texto 4s
        }

        a:hover img {
            transform: scale(1.2);
            transition: 0.3s;

        }
    </style>
</head>

<body>
    <nav>
        <ul>
            <li><a href="sobreMim.html">Sobre Mim</a></li>
            <li><a href="index.html" class="inicio">Início</a></li>
            <li><a href="projetos.html" class="ativo">Projetos</a></li>

            <div class="circulo"></div>
        </ul>

    </nav>
    <ul class="lista-projetos">

            <a href="https://benjaminpazos.github.io/harry-potter/">

            </a>
        </li>

        </li>
    </ul>
</body>

</html>
